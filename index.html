<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖文生成室 AI · Gemini 出圖版</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#22252A">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="圖文生成室">
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
<script defer src="/_vercel/insights/script.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#F4F3EF; --panel:#FFF; --ink:#22252A; --ink-2:#5A5F68; --line:#E4E2DB;
  --accent:#E8552F; --accent-soft:#FBE9E2; --ok:#2E7D52; --ok-soft:#E4F1E9;
  --mono:'JetBrains Mono',monospace; --sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand h1{font-size:17px;font-weight:900;letter-spacing:.05em;display:inline}
.brand span{font-size:11px;color:var(--ink-2);font-family:var(--mono);margin-left:8px}
.hright{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rail{display:flex;gap:4px}
.dot{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:9px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.dot.done{background:var(--ink);border-color:var(--ink);color:#fff}
#keyBtn{font-size:12px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#keyBtn.ok{border-color:var(--ok);color:var(--ok);background:var(--ok-soft)}
#clearKeyBtn{font-size:12px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#clearKeyBtn:hover{border-color:var(--accent);color:var(--accent)}
#archiveBtn{font-size:12px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#archiveBtn:hover{background:var(--ink);color:#fff}
#arcCount{color:var(--accent);font-family:var(--mono)}
.gbtn.star{border-color:var(--accent);color:var(--accent);min-width:30px}
.gbtn.star.on{background:var(--accent);color:#fff}
/* archive drawer */
#drawer{position:fixed;inset:0;background:rgba(20,22,26,.5);display:none;z-index:80}
#drawer.open{display:flex;justify-content:flex-end}
.dpanel{width:min(520px,94vw);height:100%;background:var(--bg);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.25)}
.dhead{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px}
.dhead h2{font-size:15px;font-weight:900;flex:1}
.dhead .sz{font-size:11px;color:var(--ink-2);font-family:var(--mono)}
.dbody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.dfolder{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.dfh{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);background:#FBFAF7}
.dfh input{accent-color:var(--accent);width:16px;height:16px}
.dfh .fn{font-size:13px;font-weight:900;flex:1;word-break:break-all}
.dfh .fc{font-size:11px;color:var(--ink-2);font-family:var(--mono)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;padding:12px 14px}
.dthumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--line);aspect-ratio:1;cursor:zoom-in}
.dthumb img{width:100%;height:100%;object-fit:cover;display:block}
.dthumb .dt-dl{position:absolute;right:3px;bottom:3px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:5px;padding:2px 6px;cursor:pointer}
.dfoot{background:var(--panel);border-top:1px solid var(--line);padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.dempty{text-align:center;color:var(--ink-2);font-size:13px;padding:60px 20px;line-height:2}
/* plan cards */
.plans{display:flex;flex-direction:column;gap:10px;margin-left:42px;max-width:94%}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.pcard .top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pcard .n{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--ink);color:#fff;border-radius:5px;padding:2px 8px}
.pcard h3{font-size:14.5px;font-weight:900;flex:1}
.pcard .goal{font-size:12.5px;color:var(--ink-2)}
.pcard .cp{margin-top:8px;background:#F8F7F4;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.7}
.pcard .cp .h{font-weight:900;font-size:15px}
.pcard .cp .s{color:var(--accent);font-weight:700}
.pcard details{margin-top:8px;font-size:12px;color:var(--ink-2)}
.pcard details pre{white-space:pre-wrap;font-family:var(--sans);background:#F6F5F1;border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.6}
/* main-image option panel */
.optrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.optlbl{font-size:12px;font-weight:900;color:var(--ink-2);width:58px;flex-shrink:0}
.optin{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--sans);min-width:120px}
.optin:focus{outline:none;border-color:var(--accent)}
.opt{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;background:#F8F7F4;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px;cursor:pointer;user-select:none}
.opt:has(input:checked){border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.opt input{accent-color:var(--accent);margin:0}
/* per-image revision input */
.fix{display:flex;gap:6px;padding:0 12px 12px}
.fix input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:var(--sans);min-width:0}
.fix input:focus{outline:none;border-color:var(--accent)}
.fix button{font-size:12px;font-weight:700;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:0 14px;cursor:pointer;font-family:var(--sans);flex-shrink:0}
.fix button:hover{background:#C9401F}
.fix button:disabled{background:#D8D5CC}
/* 提示詞僅開發者模式可見 */
.promptbox{display:none}
body.admin .promptbox{display:block}
body.admin::after{content:'DEV';position:fixed;left:10px;bottom:10px;background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;border-radius:6px;padding:3px 8px;z-index:99}
select{font-size:12px;font-weight:700;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-family:var(--sans);background:#fff}
#chat{flex:1;overflow-y:auto;padding:22px 16px 12px;display:flex;flex-direction:column;gap:14px;max-width:900px;width:100%;margin:0 auto}
.msg{display:flex;gap:10px;max-width:94%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
.msg.bot .avatar{background:var(--ink);color:#fff}
.msg.user .avatar{background:var(--accent);color:#fff}
.bubble{padding:12px 15px;border-radius:14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.msg.bot .bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:4px}
.msg.user .bubble{background:var(--ink);color:#fff;border-top-right-radius:4px}
.bubble b{color:var(--accent)} .msg.user .bubble b{color:#FFB49C}
.bubble img.upl{max-width:130px;border-radius:8px;display:inline-block;margin:6px 6px 0 0}
.bubble input.keyin{width:100%;margin-top:8px;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-left:42px}
.chip{background:#fff;border:1.5px solid var(--ink);border-radius:99px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.chip:hover{background:var(--ink);color:#fff}
.chip.acc{border-color:var(--accent);color:var(--accent)}
.chip.acc:hover{background:var(--accent);color:#fff}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing i{width:6px;height:6px;background:var(--ink-2);border-radius:50%;animation:tp 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,100%{opacity:.25}50%{opacity:1;transform:translateY(-3px)}}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-left:42px}
.gcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.gcard .imgwrap{aspect-ratio:1;background:#F0EFEA;position:relative}
.gcard img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.gcard .loading{position:absolute;inset:0;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;font-size:12px;color:var(--ink-2)}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.gcard .meta{padding:10px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gcard .meta .n{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--ink);color:#fff;border-radius:5px;padding:1px 7px}
.gcard .meta .t{font-size:13px;font-weight:700;flex:1}
.gbtn{font-size:11px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;font-family:var(--sans)}
.gbtn:hover{background:var(--ink);color:#fff}
.gcard details{padding:0 12px 10px;font-size:11.5px;color:var(--ink-2)}
.gcard details pre{white-space:pre-wrap;font-family:var(--sans);background:#F6F5F1;border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.6}
.cardbtns{display:flex;gap:8px;flex-wrap:wrap;margin-left:42px}
.mini{font-size:13px;font-weight:700;border-radius:9px;padding:9px 18px;cursor:pointer;border:1.5px solid var(--ink);background:#fff;font-family:var(--sans)}
.mini:hover{background:var(--ink);color:#fff}
.mini.fill{background:var(--accent);border-color:var(--accent);color:#fff}
.mini.fill:hover{background:#C9401F}
#bar{background:var(--panel);border-top:1px solid var(--line);padding:12px 16px}
.barin{max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
#photoBtn{height:42px;padding:0 14px;border-radius:12px;border:1.5px dashed var(--ink-2);background:#fff;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;font-family:var(--sans)}
#photoBtn.has{border-style:solid;border-color:var(--ok);background:var(--ok-soft)}
textarea{flex:1;resize:none;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-family:var(--sans);font-size:14px;line-height:1.6;max-height:160px}
textarea:focus{outline:none;border-color:var(--accent)}
#send{width:42px;height:42px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:17px;cursor:pointer;flex-shrink:0}
.hint{max-width:900px;margin:6px auto 0;font-size:11px;color:var(--ink-2);text-align:center}
.hint a,.bubble a{color:var(--accent);font-weight:700;text-decoration:none}
.hint a:hover,.bubble a:hover{text-decoration:underline}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}
@media(max-width:640px){.gallery{margin-left:0}.chips{margin-left:0}.cardbtns{margin-left:0}.dot{width:16px;height:16px}}
</style>
</head>
<body>

<header>
  <div class="brand"><h1>圖文生成室 AI</h1><span id="verTag"></span></div>
  <div class="hright">
    <select id="providerSel" title="生圖 AI 供應商">
      <option value="gemini">🍌 Gemini Nano Banana</option>
      <option value="openai" disabled>OpenAI GPT Image（籌備中）</option>
      <option value="seedream" disabled>Seedream（籌備中）</option>
    </select>
    <select id="modelSel"></select>
    <button id="keyBtn">🔑 設定 API Key</button>
    <button id="clearKeyBtn" title="從這台電腦移除已儲存的 Key">🗑️ 清除 Key</button>
    <button id="archiveBtn" title="已收藏圖片的本機暫存區">🗂️ 暫存區 <span id="arcCount"></span></button>
    <div class="rail" id="rail"></div>
  </div>
</header>

<div id="chat"></div>

<div id="bar">
  <div class="barin">
    <button id="photoBtn">📷 商品照 <span id="pc">0</span>/3</button>
    <input type="file" id="photoInput" accept="image/*" multiple hidden>
    <textarea id="input" rows="1" placeholder="輸入訊息…"></textarea>
    <button id="send">➤</button>
  </div>
  <div class="hint">本工具直接呼叫 Google Gemini API 出圖 · 10 張全套約 NT$10~30 · 免費申請 API Key：<a href="https://aistudio.google.com" target="_blank" rel="noopener">aistudio.google.com</a></div>
</div>

<div id="drawer" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="dpanel">
    <div class="dhead"><h2>🗂️ 本機暫存區</h2><span class="sz" id="dSize"></span><button class="gbtn" onclick="$('#drawer').classList.remove('open')">關閉</button></div>
    <div class="dbody" id="dBody"></div>
    <div class="dfoot">
      <button class="mini" onclick="delChecked()">刪除勾選資料夾</button>
      <button class="mini" onclick="clearArchive()">清空全部</button>
    </div>
  </div>
</div>

<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg"></div>

<script>
/* ═══════════ 更新日誌 ═══════════
v2.1.0 2026-07-04
  ・支援進階風格解鎖：輸入「/解鎖碼」可啟用進階授權限定風格
  ・風格選項改為可動態更新
v2.0.0 2026-07-04
  ・架構升級：提示詞與流程邏輯全數移至 Cloudflare Worker 後端，
    客戶端不再含任何核心資產（F12 無密可看）
  ・新增授權碼系統：無有效授權碼無法使用任何功能（伺服器端驗證）
  ・照片自動壓縮至 1280px 再上傳，加速生成
  ・工作階段制：照片與企劃存於伺服器 24 小時
v1.6.0 2026-07-03
  ・提示詞改為開發者模式限定（輸入管理暗號切換），一般客戶不可見
  ・部署版程式碼混淆（字串加密），保護提示詞與流程邏輯
v1.5.0 2026-07-03
  ・歡迎語更名「圖文生成室 AI」；標題列改為生圖供應商下拉選單
  ・新增 PROVIDERS 供應商架構，未來可註冊 OpenAI/Seedream 等其他生圖 AI
v1.4.1 2026-07-03
  ・修復「先不用，繼續流程」按鈕無回應（現在會引導貼商品資料）
  ・新增快捷指令：任何時候輸入「做主圖」即啟動白底主圖流程
v1.4.0 2026-07-03
  ・新增本機暫存區（IndexedDB）：每次產圖依「商品名＋時間戳」自動建資料夾
  ・每張圖可按 ☆ 收藏進暫存區；右上角 🗂️ 開啟暫存區
  ・暫存區支援：縮圖瀏覽、單張下載/移除、資料夾打包ZIP、勾選刪除資料夾、一鍵清空
v1.3.0 2026-07-03
  ・新增「忽略參考圖後製文字」規則：參考照片上的行銷標語、浮水印、
    貼圖不再被複製到生成圖中；圖上文字一律以工具撰寫的繁中文案為準
  ・介面顯示版本號與更新日誌
v1.2.0 2026-07-03
  ・白底主圖升級：AI 主體辨識（自動判斷商品、列出待移除干擾物）＋
    風格勾選面板（背景單選、陰影/倒影/主標複選）
  ・主圖完成後新增「開始製作圖文」引導按鈕
v1.1.0 2026-07-03
  ・新增白底主圖功能、模特（畫面主角）選填步驟
  ・使用監測（Vercel Analytics + Google Sheet 事件回報）
  ・aistudio.google.com 申請連結
v1.0.0 2026-07-03
  ・聊天式三階段流程：商品分析 → 企劃確認（免費）→ 10 張描述圖生成
  ・逐圖修改輸入框、重抽、ZIP 打包；Key 每台電腦記憶＋手動清除
════════════════════════════════ */
const VERSION='v2.1.0';
/* ★★★ 部署 Cloudflare Worker 後，把 Worker 網址貼在下面引號內 ★★★
   例如：const WORKER_URL='https://listing-studio-api.你的帳號.workers.dev'; */
const WORKER_URL='https://listing-studio-ai.senmao.workers.dev';
const $=s=>document.querySelector(s);
const chat=$('#chat'), input=$('#input');
const TEXT_MODEL='gemini-2.5-flash';
const state={stage:'lic',lic:'',key:'',sid:'',sessionDirty:false,product:'',model:'',photos:[],summary:null,style:null,prompts:[],imgs:{}};

/* ═══ 使用監測（選填）═══
   到 Google Apps Script 部署好收集端後，把網址貼進 TRACK_URL（見「監測平台設定說明」）。
   留空 = 完全不回報。只回報事件計數與費用估算，絕不傳送使用者的商品資料、照片或 Key。 */
const TRACK_URL='';
const COST_TWD={'gemini-3.1-flash-image':2,'gemini-3.1-flash-lite-image':1,'gemini-3-pro-image':5,'gemini-2.5-flash-image':1.5,'text':0.05};
const SID=(()=>{try{let s=localStorage.getItem('sid');if(!s){s=Math.random().toString(36).slice(2,10);localStorage.setItem('sid',s);}return s;}catch(e){return 'anon'}})();
function track(event,model,n){
  if(!TRACK_URL)return;
  try{fetch(TRACK_URL,{method:'POST',mode:'no-cors',keepalive:true,
    body:JSON.stringify({sid:SID,event,model:model||'',n:n||1,cost:+((COST_TWD[model]||0)*(n||1)).toFixed(2),ua:navigator.userAgent.slice(0,60)})});}catch(e){}
}
track('visit');
$('#verTag').textContent=VERSION;

/* ============ 生圖供應商架構（未來擴充其他生圖 AI 在此註冊） ============ */
const PROVIDERS={
  gemini:{models:[
    ['gemini-3.1-flash-image','NB2 標準（約NT$2/張・推薦）'],
    ['gemini-3.1-flash-lite-image','NB2 Lite（約NT$1/張・最省）'],
    ['gemini-3-pro-image','NB Pro（約NT$4~8/張・最精）'],
    ['gemini-2.5-flash-image','NB1 原版（人少不塞車・備用）']]}
  /* 未來範例：openai:{models:[['gpt-image-1','GPT Image（約NT$5/張）']]} — 同時需在 Worker 的 gemImage 增加對應呼叫分支 */
};
function fillModels(p){$('#modelSel').innerHTML=PROVIDERS[p].models.map(m=>`<option value="${m[0]}">${m[1]}</option>`).join('');}
$('#providerSel').onchange=e=>fillModels(e.target.value);
fillModels('gemini');

/* ============ 本機暫存區（IndexedDB，純本機不上傳） ============ */
const idb={db:null,
  open(){return new Promise((res,rej)=>{
    const r=indexedDB.open('listing-studio',1);
    r.onupgradeneeded=e=>{const d=e.target.result;
      const s=d.createObjectStore('imgs',{keyPath:'id',autoIncrement:true});
      s.createIndex('folder','folder');};
    r.onsuccess=e=>{idb.db=e.target.result;res();};r.onerror=()=>rej(r.error);});},
  tx(mode){return idb.db.transaction('imgs',mode).objectStore('imgs');},
  add(rec){return new Promise((res,rej)=>{const q=idb.tx('readwrite').add(rec);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});},
  del(id){return new Promise(res=>{idb.tx('readwrite').delete(id).onsuccess=()=>res();});},
  all(){return new Promise(res=>{const q=idb.tx('readonly').getAll();q.onsuccess=()=>res(q.result||[]);});},
  clear(){return new Promise(res=>{idb.tx('readwrite').clear().onsuccess=()=>res();});}
};
state.starred={};state.folder=null;
function getFolder(){
  if(!state.folder){
    const name=(state.summary?.name||state.subject?.subject||'未命名商品').replace(/[\\/:*?"'`<>|]/g,'');
    const d=new Date(),p=n=>String(n).padStart(2,'0');
    state.folder=`${name}_${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
  }
  return state.folder;
}

window.toggleStar=async key=>{
  const btn=$('#star-'+key);
  try{
    if(state.starred[key]){await idb.del(state.starred[key]);delete state.starred[key];btn.classList.remove('on');btn.textContent='☆';}
    else{
      let data,label;
      if(key[0]==='d'){const no=+key.slice(1);data=state.imgs[no];label=`${String(no).padStart(2,'0')}_${IMG_TITLES[no]}`;}
      else{const id=+key.slice(1);data=state.mains[id]?.img;label=`主圖_${state.mains[id]?.label}`;}
      if(!data)return;
      const id=await idb.add({folder:getFolder(),ts:Date.now(),label,data});
      state.starred[key]=id;btn.classList.add('on');btn.textContent='★';
    }
    updateArcCount();
  }catch(e){addMsg('bot','⚠️ 暫存失敗：'+esc(e.message));}
};

async function renderDrawer(){
  const all=await idb.all();
  const body=$('#dBody');
  const mb=(all.reduce((s,r)=>s+(r.data?.length||0),0)/1048576).toFixed(1);
  $('#dSize').textContent=all.length?`${all.length} 張 · 約 ${mb} MB`:'';
  if(!all.length){body.innerHTML=`<div class="dempty">暫存區是空的<br>在圖片卡片上按 ☆ 星星即可把喜歡的圖存到這裡<br>（只存在這台電腦，換電腦看不到）</div>`;return;}
  const folders={};
  all.forEach(r=>{(folders[r.folder]=folders[r.folder]||[]).push(r);});
  body.innerHTML=Object.entries(folders).sort((a,b)=>b[1][0].ts-a[1][0].ts).map(([f,recs])=>`
    <div class="dfolder">
      <div class="dfh"><input type="checkbox" class="fchk" value="${esc(f)}">
        <span class="fn">📁 ${esc(f)}</span><span class="fc">${recs.length} 張</span>
        <button class="gbtn" onclick="dlFolder('${esc(f)}')">ZIP</button></div>
      <div class="dgrid">${recs.map(r=>`
        <div class="dthumb"><img src="${r.data}" onclick="lbShow(this.src)">
        <button class="dt-dl" onclick="event.stopPropagation();dlRec(${r.id})">⬇</button></div>`).join('')}</div>
    </div>`).join('');
  state._recs=all;
}

  all.filter(r=>r.folder===f).forEach((r,i)=>zip.file(`${r.label}_${i+1}.png`,r.data.split(',')[1],{base64:true}));
  const blob=await zip.generateAsync({type:'blob'});

window.delChecked=async()=>{
  const picked=[...document.querySelectorAll('.fchk:checked')].map(c=>c.value);
  if(!picked.length)return alert('請先勾選要刪除的資料夾');
  if(!confirm(`確定刪除 ${picked.length} 個資料夾？此動作無法復原。`))return;

const licStore={get v(){try{return localStorage.getItem('lic')||''}catch(e){return state._l||''}},

async function api(path,body){
  const res=await fetch(WORKER_URL+path,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({lic:state.lic,key:state.key,sid:state.sid,...body})});
  let d;try{d=await res.json();}catch(e){throw new Error('伺服器回應異常，請稍後再試');}
  if(d.error){
    if(res.status===401){licStore.v='';state.lic='';state.stage='lic';askLic(d.error==='NEED_LIC'?'':d.error);}
    throw new Error(d.error==='NEED_LIC'?'需要授權碼':d.error);
  }
  if(path==='/t')track('text','text',1);
  return d;
}

/* 照片壓縮：最長邊 1280px，JPEG 85%，加速上傳與生成 */
function downscale(file){return new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const M=1280;let w=img.width,h=img.height;
    if(Math.max(w,h)>M){const k=M/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const src=c.toDataURL('image/jpeg',0.85);
    URL.revokeObjectURL(img.src);
    res({src,mime:'image/jpeg',b64:src.split(',')[1]});
  };
  img.onerror=()=>{const r=new FileReader();r.onload=()=>res({src:r.result,mime:file.type,b64:r.result.split(',')[1]});r.readAsDataURL(file);};
  img.src=URL.createObjectURL(file);
});}

  addMsg('user','開始製作圖文');
  state.stage='collect';
  addMsg('bot',`接下來三步：\n<b>①</b> 貼商品資料＋上傳 1~3 張商品照（左下角 📷，AI 會以照片為基準保持包裝一致；剛剛上傳的照片會直接沿用）\n<b>②</b> 我整理賣點，你選風格\n<b>③</b> Nano Banana 直接生成 10 張 1:1 商品描述圖，可逐張重生、打包 ZIP\n\n請貼上：商品名稱／簡介／主要賣點／售價規格`);
}
window.runMain=async id=>{
  const card=$('#gm'+id);
  card.querySelector('.imgwrap').innerHTML=`<div class="loading"><div class="spinner"></div>生成中…</div>`;
  try{
    if(!state.mains[id].mid)throw new Error('請重新生成此主圖');
    const r=await api('/i',{mid:state.mains[id].mid,model:$('#modelSel').value});
    const url=r.img;
    track('image',$('#modelSel').value,1);
    delete state.starred['m'+id];const sb=$('#star-m'+id);if(sb){sb.classList.remove('on');sb.textContent='☆';}
    state.mains[id].img=url;
    card.querySelector('.imgwrap').innerHTML=`<img src="${url}" onclick="lbMain(${id})">`;
  }catch(e){
    card.querySelector('.imgwrap').innerHTML=`<div class="loading">⚠️ ${esc(e.message).slice(0,60)}<button class="gbtn" onclick="runMain(${id})">重試</button></div>`;
  }
};
window.lbMain=id=>{$('#lbimg').src=state.mains[id].img;$('#lightbox').style.display='flex';};
window.dlMain=id=>{const a=document.createElement('a');a.href=state.mains[id].img;a.download=`主圖_${state.mains[id].label}.png`;a.click();};
window.reviseMain=async id=>{
  const inp=$('#fm'+id);const req=inp.value.trim();
  if(!req){inp.focus();return;}
  const btn=inp.nextElementSibling;btn.disabled=true;btn.textContent='修改中';
  const card=$('#gm'+id);
  card.querySelector('.imgwrap').innerHTML=`<div class="loading"><div class="spinner"></div>依需求調整中…</div>`;
  try{
    await api('/t',{task:'reviseMain',mid:state.mains[id].mid,req});
    inp.value='';
    await runMain(id);
  }catch(e){
    card.querySelector('.imgwrap').innerHTML=`<div class="loading">⚠️ ${esc(e.message).slice(0,60)}<button class="gbtn" onclick="runMain(${id})">重試</button></div>`;
  }
  btn.disabled=false;btn.textContent='修改';
};

/* send */
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,160)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
$('#send').onclick=handleSend;
function handleSend(){
  const t=input.value.trim();if(!t)return;
  input.value='';input.style.height='auto';
  /* 解鎖指令：以 / 開頭視為解鎖碼，任何階段皆可，不回顯內容 */
  if(t.startsWith('/')&&t.length>1){
    addMsg('user','（輸入解鎖碼）');
    runUnlock(t.slice(1));
    return;
  }
  addMsg('user',esc(t));
  /* 快捷指令：任何階段輸入「做主圖」即啟動白底主圖流程 */
  if(/^(做|製作|生成|我要做?)?(白底)?主圖$/.test(t.replace(/\s/g,''))){
    if(state.stage==='key'){addMsg('bot','請先完成 API Key 設定。');return;}
    mainImageFlow();return;
  }
  if(state.stage==='lic'){setLic(t);}
  else if(state.stage==='key'){setKey(t);}
  else if(state.stage==='collect'){state.product=t;runAnalyze();}
  else if(state.stage==='model'){state.model=t;document.querySelectorAll('.chips').forEach(c=>c.remove());runPrompts();}
  else if(state.stage==='plan'||state.stage==='free')runFree(t);
}

/* stage: analyze */
async function runAnalyze(){
  state.stage='busy';const stop=typing();
  try{
    await ensureSession();
    const r=await api('/t',{task:'analyze',product:state.product});
    state.summary=r;state.folder=null;stop();
    addMsg('bot',`收到！\n\n<b>${esc(r.name)}</b>｜${esc(r.summary)}\n<b>賣點</b>：${r.points.map(esc).join('、')}\n<b>客群</b>：${esc(r.audience)}\n\n選一個視覺風格，選完直接開始出圖（10 張，約 1~3 分鐘）：`);
    showStyleChips(r.styles);
    state.stage='idle';
  }catch(e){stop();fail(e,runAnalyze);}
}

function showStyleChips(styles){
  addChips(styles.map(s=>({label:`${s.id}｜${s.name}`,acc:true,fn:()=>{state.style=s;addMsg('user','選 '+s.name);askModel();}})));
}

/* 進階風格解鎖：輸入「/解鎖碼」觸發，碼由伺服器驗證 */
async function runUnlock(code){
  const stop=typing('驗證解鎖碼');
  try{
    await ensureSession();
    const r=await api('/t',{task:'unlock',code});stop();
    addMsg('bot','✅ 進階風格已解鎖！');
    if(r.styles&&state.summary){
      state.summary.styles=r.styles;
      addMsg('bot','風格選項已更新，請重新選擇：');
      document.querySelectorAll('.chips').forEach(c=>c.remove());
      showStyleChips(r.styles);
      state.stage='idle';
    }
  }catch(e){stop();addMsg('bot','⚠️ '+esc(e.message));}
}

/* stage: optional subject/model */
function askModel(){
  state.stage='model';
  addMsg('bot',`最後一個選填項：要指定<b>畫面主角（模特）</b>嗎？\n\n可以是動物、人物或任何主體，AI 會讓主角在情境圖中與商品自然互動，整套形象保持一致。\n\n直接在下方輸入，例如「一隻橘貓」「25歲女生居家穿搭」「柴犬」；不需要就按跳過。`);
  addChips([{label:'跳過（AI 自行決定）',fn:()=>{state.model='';addMsg('user','跳過');runPrompts();}}]);
}

/* stage: build 10 prompts (server-side) */
async function runPrompts(){
  state.stage='busy';const stop=typing('正在撰寫 10 張圖的文案企劃');
  try{
    await ensureSession();
    const r=await api('/t',{task:'prompts',style:state.style,model:state.model});
    state.prompts=r.plan;
    stop();
    showPlan();
  }catch(e){stop();fail(e,runPrompts);}
}

/* stage: show plan for review before spending on generation */
function showPlan(){
  addMsg('bot',`10 張圖的<b>文案企劃</b>完成 📋 出圖前請先過目（這一步<b>還沒開始扣費</b>）：`);
  const wrap=document.createElement('div');wrap.className='plans';
  state.prompts.forEach(p=>{
    wrap.insertAdjacentHTML('beforeend',`<div class="pcard" id="pc${p.no}">
      <div class="top"><span class="n">${String(p.no).padStart(2,'0')}</span><h3>${IMG_TITLES[p.no]}</h3><span class="goal">${esc(p.goal||'')}</span></div>
      <div class="cp"><div class="h">${esc(p.h||'')}</div><div class="s">${esc(p.s||'')}</div></div></div>`);
  });
  chat.appendChild(wrap);chat.scrollTop=chat.scrollHeight;
  addMsg('bot',`要調整任何一張，直接打字告訴我，例如「<b>第 4 張主標改成強調 24H 除臭</b>」，我會即時更新企劃。\n\n確認沒問題就按下面開始出圖（10 張，使用 <b>${$('#modelSel').selectedOptions[0].text}</b>，右上角可換模型）：`);
  addChips([{label:'🍌 確認企劃，開始生成 10 張圖',acc:true,fn:()=>{addMsg('user','確認，開始出圖');renderGallery();}}]);
  state.stage='plan';
}

/* stage: generate images */
async function renderGallery(){
  state.stage='busy';
  const g=document.createElement('div');g.className='gallery';
  state.prompts.forEach(p=>{
    g.insertAdjacentHTML('beforeend',`<div class="gcard" id="g${p.no}">
      <div class="imgwrap"><div class="loading"><div class="spinner"></div>排隊中…</div></div>
      <div class="meta"><span class="n">${String(p.no).padStart(2,'0')}</span><span class="t">${IMG_TITLES[p.no]}</span>
      <button class="gbtn star" id="star-d${p.no}" onclick="toggleStar('d${p.no}')" title="收藏到本機暫存區">☆</button>
      <button class="gbtn" onclick="dl(${p.no})">下載</button><button class="gbtn" onclick="regen(${p.no})">重抽</button></div>
      <div class="fix"><input id="fx${p.no}" placeholder="輸入修改需求，例如：留白不要太多" onkeydown="if(event.key==='Enter')reviseOne(${p.no})"><button onclick="reviseOne(${p.no})">修改</button></div></div>`);
  });
  chat.appendChild(g);chat.scrollTop=chat.scrollHeight;
  for(const p of state.prompts)await genOne(p.no);
  const btns=document.createElement('div');btns.className='cardbtns';
  btns.innerHTML=`<button class="mini fill" onclick="dlZip(this)">📦 打包下載全部（ZIP）</button>`;
  chat.appendChild(btns);
  addMsg('bot','全部完成 ✅\n\n・每張圖下方有<b>修改輸入框</b>：輸入需求（例如「留白不要太多」「主標改紅色」「商品放大一點」）按修改或 Enter，會依需求改寫提示詞後<b>自動重新出圖</b>\n・「重抽」＝同提示詞再抽一次（純看運氣換構圖）\n・點圖可放大檢視');
  chat.scrollTop=chat.scrollHeight;
  state.stage='free';
}

/* per-image precise revision */
window.reviseOne=async no=>{
  const inp=$('#fx'+no);
  const req=inp.value.trim();
  if(!req){inp.focus();return;}
  const btn=inp.nextElementSibling;btn.disabled=true;btn.textContent='修改中';
  const card=$('#g'+no);
  card.querySelector('.imgwrap').innerHTML=`<div class="loading"><div class="spinner"></div>依需求調整中…</div>`;
  try{
    await api('/t',{task:'revise',no,req});
    inp.value='';
    await genOne(no);
  }catch(e){
    card.querySelector('.imgwrap').innerHTML=`<div class="loading">⚠️ ${esc(e.message).slice(0,60)}<button class="gbtn" onclick="genOne(${no})">重試</button></div>`;
  }
  btn.disabled=false;btn.textContent='修改';
};
async function genOne(no){
  const card=$('#g'+no);
  const setLoad=t=>card.querySelector('.imgwrap').innerHTML=`<div class="loading"><div class="spinner"></div>${esc(t)}</div>`;
  setLoad('生成中…');
  try{
    const r=await api('/i',{no,model:$('#modelSel').value});
    const url=r.img;
    track('image',$('#modelSel').value,1);
    delete state.starred['d'+no];const sb=$('#star-d'+no);if(sb){sb.classList.remove('on');sb.textContent='☆';}
    state.imgs[no]=url;rail();
    card.querySelector('.imgwrap').innerHTML=`<img src="${url}" onclick="lb('${no}')">`;
  }catch(e){
    card.querySelector('.imgwrap').innerHTML=`<div class="loading">⚠️ ${esc(e.message).slice(0,60)}<button class="gbtn" onclick="genOne(${no})">重試</button></div>`;
  }
}
window.regen=no=>genOne(no);
window.lb=no=>{$('#lbimg').src=state.imgs[no];$('#lightbox').style.display='flex';};

/* downloads */
window.dl=no=>{const a=document.createElement('a');a.href=state.imgs[no];a.download=`${String(no).padStart(2,'0')}_${IMG_TITLES[no]}.png`;a.click();};
window.dlZip=async btn=>{
  btn.textContent='打包中…';
  const zip=new JSZip();
  Object.entries(state.imgs).forEach(([no,d])=>zip.file(`${String(no).padStart(2,'0')}_${IMG_TITLES[no]}.png`,d.split(',')[1],{base64:true}));
  Object.values(state.mains).forEach(m=>{if(m.img)zip.file(`00_主圖_${m.label}.png`,m.img.split(',')[1],{base64:true});});
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${state.summary?.name||'商品'}_描述圖10張.zip`;a.click();
  btn.textContent='📦 打包下載全部（ZIP）';
};

/* free adjust: plan stage edits the plan; free stage edits prompt then regenerates */
async function runFree(text){
  const stop=typing();
  try{
    const r=await api('/t',{task:'edit',text});stop();
    if(r.action==='update'){
      const p=state.prompts.find(x=>x.no===r.no);
      if(p)Object.assign(p,{goal:r.goal,h:r.h,s:r.s});
      const planCard=$('#pc'+r.no);
      if(planCard){
        planCard.querySelector('.goal').textContent=r.goal;
        planCard.querySelector('.cp .h').textContent=r.h;
        planCard.querySelector('.cp .s').textContent=r.s;
      }
      if(state.stage==='free'&&$('#g'+r.no)){
        addMsg('bot',`✅ 第 ${r.no} 張已更新，重新出圖中…`);
        await genOne(r.no);
        $('#g'+r.no).scrollIntoView({behavior:'smooth',block:'center'});
      }else{
        addMsg('bot',`✅ 第 ${r.no} 張企劃已更新（主標：「${esc(r.h)}」）。還要調整其他張嗎？確認後按「開始生成」。`);
        if(planCard)planCard.scrollIntoView({behavior:'smooth',block:'center'});
        addChips([{label:'🍌 確認企劃，開始生成 10 張圖',acc:true,fn:()=>{addMsg('user','確認，開始出圖');renderGallery();}}]);
      }
    }else addMsg('bot',esc(r.reply));
  }catch(e){stop();fail(e,()=>runFree(text));}
}

function fail(err,retry){
  addMsg('bot',`⚠️ 出了點問題：${esc(err.message)}\n（常見原因：授權/Key 無效、免費額度用完、或網路問題）`);
  addChips([{label:'重試',acc:true,fn:retry},{label:'重設 API Key',fn:()=>{state.stage='key';askKey();}}]);
  state.stage='idle';
}
</script>
