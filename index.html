<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圖文生成室 AI · Gemini 出圖版</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#22252A">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="圖文生成室">
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
<script defer src="/_vercel/insights/script.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#F4F3EF; --panel:#FFF; --ink:#22252A; --ink-2:#5A5F68; --line:#E4E2DB;
  --accent:#E8552F; --accent-soft:#FBE9E2; --ok:#2E7D52; --ok-soft:#E4F1E9;
  --mono:'JetBrains Mono',monospace; --sans:'Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100dvh;display:flex;flex-direction:column}
header{background:var(--panel);border-bottom:1px solid var(--line);padding:12px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand h1{font-size:17px;font-weight:900;letter-spacing:.05em;display:inline}
.brand span{font-size:11px;color:var(--ink-2);font-family:var(--mono);margin-left:8px}
.hright{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rail{display:flex;gap:4px}
.dot{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);background:#fff;font-size:9px;font-family:var(--mono);display:flex;align-items:center;justify-content:center;color:var(--ink-2)}
.dot.done{background:var(--ink);border-color:var(--ink);color:#fff}
#keyBtn{font-size:12px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#keyBtn.ok{border-color:var(--ok);color:var(--ok);background:var(--ok-soft)}
#clearKeyBtn{font-size:12px;font-weight:700;border:1.5px solid var(--line);background:#fff;color:var(--ink-2);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#clearKeyBtn:hover{border-color:var(--accent);color:var(--accent)}
#archiveBtn{font-size:12px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
#archiveBtn:hover{background:var(--ink);color:#fff}
#arcCount{color:var(--accent);font-family:var(--mono)}
.gbtn.star{border-color:var(--accent);color:var(--accent);min-width:30px}
.gbtn.star.on{background:var(--accent);color:#fff}
/* archive drawer */
#drawer{position:fixed;inset:0;background:rgba(20,22,26,.5);display:none;z-index:80}
#drawer.open{display:flex;justify-content:flex-end}
.dpanel{width:min(520px,94vw);height:100%;background:var(--bg);display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.25)}
.dhead{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:10px}
.dhead h2{font-size:15px;font-weight:900;flex:1}
.dhead .sz{font-size:11px;color:var(--ink-2);font-family:var(--mono)}
.dbody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:12px}
.dfolder{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.dfh{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line);background:#FBFAF7}
.dfh input{accent-color:var(--accent);width:16px;height:16px}
.dfh .fn{font-size:13px;font-weight:900;flex:1;word-break:break-all}
.dfh .fc{font-size:11px;color:var(--ink-2);font-family:var(--mono)}
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;padding:12px 14px}
.dthumb{position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--line);aspect-ratio:1;cursor:zoom-in}
.dthumb img{width:100%;height:100%;object-fit:cover;display:block}
.dthumb .dt-dl{position:absolute;right:3px;bottom:3px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:5px;padding:2px 6px;cursor:pointer}
.dfoot{background:var(--panel);border-top:1px solid var(--line);padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap}
.dempty{text-align:center;color:var(--ink-2);font-size:13px;padding:60px 20px;line-height:2}
/* plan cards */
.plans{display:flex;flex-direction:column;gap:10px;margin-left:42px;max-width:94%}
.pcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px}
.pcard .top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.pcard .n{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--ink);color:#fff;border-radius:5px;padding:2px 8px}
.pcard h3{font-size:14.5px;font-weight:900;flex:1}
.pcard .goal{font-size:12.5px;color:var(--ink-2)}
.pcard .cp{margin-top:8px;background:#F8F7F4;border:1px dashed var(--line);border-radius:10px;padding:10px 12px;font-size:13px;line-height:1.7}
.pcard .cp .h{font-weight:900;font-size:15px}
.pcard .cp .s{color:var(--accent);font-weight:700}
.pcard details{margin-top:8px;font-size:12px;color:var(--ink-2)}
.pcard details pre{white-space:pre-wrap;font-family:var(--sans);background:#F6F5F1;border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.6}
/* main-image option panel */
.optrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.optlbl{font-size:12px;font-weight:900;color:var(--ink-2);width:58px;flex-shrink:0}
.optin{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--sans);min-width:120px}
.optin:focus{outline:none;border-color:var(--accent)}
.opt{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;background:#F8F7F4;border:1.5px solid var(--line);border-radius:99px;padding:6px 13px;cursor:pointer;user-select:none}
.opt:has(input:checked){border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.opt input{accent-color:var(--accent);margin:0}
/* per-image revision input */
.fix{display:flex;gap:6px;padding:0 12px 12px}
.fix input{flex:1;border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12.5px;font-family:var(--sans);min-width:0}
.fix input:focus{outline:none;border-color:var(--accent)}
.fix button{font-size:12px;font-weight:700;border:none;background:var(--accent);color:#fff;border-radius:8px;padding:0 14px;cursor:pointer;font-family:var(--sans);flex-shrink:0}
.fix button:hover{background:#C9401F}
.fix button:disabled{background:#D8D5CC}
/* 提示詞僅開發者模式可見 */
.promptbox{display:none}
body.admin .promptbox{display:block}
body.admin::after{content:'DEV';position:fixed;left:10px;bottom:10px;background:var(--accent);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;border-radius:6px;padding:3px 8px;z-index:99}
select{font-size:12px;font-weight:700;border:1.5px solid var(--line);border-radius:8px;padding:6px 8px;font-family:var(--sans);background:#fff}
#chat{flex:1;overflow-y:auto;padding:22px 16px 12px;display:flex;flex-direction:column;gap:14px;max-width:900px;width:100%;margin:0 auto}
.msg{display:flex;gap:10px;max-width:94%}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900}
.msg.bot .avatar{background:var(--ink);color:#fff}
.msg.user .avatar{background:var(--accent);color:#fff}
.bubble{padding:12px 15px;border-radius:14px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word}
.msg.bot .bubble{background:#fff;border:1px solid var(--line);border-top-left-radius:4px}
.msg.user .bubble{background:var(--ink);color:#fff;border-top-right-radius:4px}
.bubble b{color:var(--accent)} .msg.user .bubble b{color:#FFB49C}
.bubble img.upl{max-width:130px;border-radius:8px;display:inline-block;margin:6px 6px 0 0}
.bubble input.keyin{width:100%;margin-top:8px;border:1.5px solid var(--line);border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-left:42px}
.chip{background:#fff;border:1.5px solid var(--ink);border-radius:99px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.chip:hover{background:var(--ink);color:#fff}
.chip.acc{border-color:var(--accent);color:var(--accent)}
.chip.acc:hover{background:var(--accent);color:#fff}
.typing{display:inline-flex;gap:4px;padding:4px 0}
.typing i{width:6px;height:6px;background:var(--ink-2);border-radius:50%;animation:tp 1s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes tp{0%,100%{opacity:.25}50%{opacity:1;transform:translateY(-3px)}}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-left:42px}
.gcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.gcard .imgwrap{aspect-ratio:1;background:#F0EFEA;position:relative}
.gcard img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.gcard .loading{position:absolute;inset:0;display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;font-size:12px;color:var(--ink-2)}
.spinner{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.gcard .meta{padding:10px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.gcard .meta .n{font-family:var(--mono);font-size:11px;font-weight:600;background:var(--ink);color:#fff;border-radius:5px;padding:1px 7px}
.gcard .meta .t{font-size:13px;font-weight:700;flex:1}
.gbtn{font-size:11px;font-weight:700;border:1.5px solid var(--ink);background:#fff;border-radius:7px;padding:4px 9px;cursor:pointer;font-family:var(--sans)}
.gbtn:hover{background:var(--ink);color:#fff}
.gcard details{padding:0 12px 10px;font-size:11.5px;color:var(--ink-2)}
.gcard details pre{white-space:pre-wrap;font-family:var(--sans);background:#F6F5F1;border-radius:8px;padding:8px 10px;margin-top:6px;line-height:1.6}
.cardbtns{display:flex;gap:8px;flex-wrap:wrap;margin-left:42px}
.mini{font-size:13px;font-weight:700;border-radius:9px;padding:9px 18px;cursor:pointer;border:1.5px solid var(--ink);background:#fff;font-family:var(--sans)}
.mini:hover{background:var(--ink);color:#fff}
.mini.fill{background:var(--accent);border-color:var(--accent);color:#fff}
.mini.fill:hover{background:#C9401F}
#bar{background:var(--panel);border-top:1px solid var(--line);padding:12px 16px}
.barin{max-width:900px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
#photoBtn{height:42px;padding:0 14px;border-radius:12px;border:1.5px dashed var(--ink-2);background:#fff;cursor:pointer;font-size:13px;font-weight:700;flex-shrink:0;font-family:var(--sans)}
#photoBtn.has{border-style:solid;border-color:var(--ok);background:var(--ok-soft)}
textarea{flex:1;resize:none;border:1.5px solid var(--line);border-radius:12px;padding:11px 14px;font-family:var(--sans);font-size:14px;line-height:1.6;max-height:160px}
textarea:focus{outline:none;border-color:var(--accent)}
#send{width:42px;height:42px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:17px;cursor:pointer;flex-shrink:0}
.hint{max-width:900px;margin:6px auto 0;font-size:11px;color:var(--ink-2);text-align:center}
.hint a,.bubble a{color:var(--accent);font-weight:700;text-decoration:none}
.hint a:hover,.bubble a:hover{text-decoration:underline}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:99;cursor:zoom-out}
#lightbox img{max-width:92vw;max-height:92vh;border-radius:8px}
@media(max-width:640px){.gallery{margin-left:0}.chips{margin-left:0}.cardbtns{margin-left:0}.dot{width:16px;height:16px}}
</style>
</head>
<body>

<header>
  <div class="brand"><h1>圖文生成室 AI</h1><span id="verTag"></span></div>
  <div class="hright">
    <select id="providerSel" title="生圖 AI 供應商">
      <option value="gemini">🍌 Gemini Nano Banana</option>
      <option value="openai" disabled>OpenAI GPT Image（籌備中）</option>
      <option value="seedream" disabled>Seedream（籌備中）</option>
    </select>
    <select id="modelSel"></select>
    <button id="keyBtn">🔑 設定 API Key</button>
    <button id="clearKeyBtn" title="從這台電腦移除已儲存的 Key">🗑️ 清除 Key</button>
    <button id="archiveBtn" title="已收藏圖片的本機暫存區">🗂️ 暫存區 <span id="arcCount"></span></button>
    <div class="rail" id="rail"></div>
  </div>
</header>

<div id="chat"></div>

<div id="bar">
  <div class="barin">
    <button id="photoBtn">📷 商品照 <span id="pc">0</span>/3</button>
    <input type="file" id="photoInput" accept="image/*" multiple hidden>
    <textarea id="input" rows="1" placeholder="輸入訊息…"></textarea>
    <button id="send">➤</button>
  </div>
  <div class="hint">本工具直接呼叫 Google Gemini API 出圖 · 10 張全套約 NT$10~30 · 免費申請 API Key：<a href="https://aistudio.google.com" target="_blank" rel="noopener">aistudio.google.com</a></div>
</div>

<div id="drawer" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="dpanel">
    <div class="dhead"><h2>🗂️ 本機暫存區</h2><span class="sz" id="dSize"></span><button class="gbtn" onclick="$('#drawer').classList.remove('open')">關閉</button></div>
    <div class="dbody" id="dBody"></div>
    <div class="dfoot">
      <button class="mini" onclick="delChecked()">刪除勾選資料夾</button>
      <button class="mini" onclick="clearArchive()">清空全部</button>
    </div>
  </div>
</div>
