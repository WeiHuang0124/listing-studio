<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商店後台 · 圖文生成室 AI</title>
<!-- ★★★ 部署後把 Worker 網址填好 ★★★ -->
<script>const API_URL='https://listing-studio-ai.senmao.workers.dev';</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#16181D;--bg:#F4F3EF;--card:#fff;--line:#E4E2DB;--sub:#6B6F78;--accent:#E8552F;--ok:#0E7C66;--warn:#C9820E;--mono:'JetBrains Mono',monospace;--sans:'Noto Sans TC',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink)}
.wrap{max-width:1120px;margin:0 auto;padding:24px}
/* login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#login .box{background:#fff;border-radius:16px;padding:36px;max-width:360px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.08)}
#login h1{font-size:22px;font-weight:900;margin-bottom:6px}
#login p{font-size:13px;color:var(--sub);margin-bottom:20px}
#login input{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;margin-bottom:14px;font-family:var(--sans)}
#login input:focus{outline:none;border-color:var(--accent)}
.btn{font-family:var(--sans);font-weight:700;border:none;border-radius:10px;padding:11px 20px;cursor:pointer;font-size:14px}
.btn.p{background:var(--accent);color:#fff}.btn.p:hover{background:#C33F1D}
.btn.o{background:#fff;border:1.5px solid var(--ink);color:var(--ink)}.btn.o:hover{background:var(--ink);color:#fff}
.btn.sm{padding:7px 14px;font-size:13px;border-radius:8px}
/* app */
#app{display:none}
header.top{background:#fff;border-bottom:1px solid var(--line)}
header.top .wrap{display:flex;align-items:center;gap:14px;padding-top:16px;padding-bottom:16px}
header.top h1{font-size:18px;font-weight:900}
.badge{font-family:var(--mono);font-size:11px;padding:3px 9px;border-radius:6px;font-weight:600}
.badge.test{background:#FDF0DC;color:var(--warn)}
.badge.prod{background:#DDF3EC;color:var(--ok)}
.sp{flex:1}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px}
.stat .lbl{font-size:12px;color:var(--sub);font-weight:500}
.stat .v{font-size:30px;font-weight:900;margin-top:6px;font-family:var(--mono)}
.stat .v.accent{color:var(--accent)}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-weight:700;font-size:14px;cursor:pointer}
.tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.panel{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th,td{text-align:left;padding:12px 16px;border-bottom:1px solid var(--line)}
th{background:#FAF9F6;font-size:12px;color:var(--sub);font-weight:700;letter-spacing:.03em}
tr:last-child td{border-bottom:none}
td.mono{font-family:var(--mono);font-size:12.5px}
.pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;display:inline-block}
.pill.paid{background:#DDF3EC;color:var(--ok)}
.pill.pending{background:#F0EEE8;color:var(--sub)}
.pill.failed{background:#FBE3DC;color:var(--accent)}
.pill.pro{background:#FDE9CF;color:var(--warn)}
.toolbar{display:flex;gap:10px;padding:16px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line)}
.toolbar input,.toolbar select{border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--sans)}
.empty{padding:50px;text-align:center;color:var(--sub);font-size:14px}
.refresh{cursor:pointer;color:var(--sub);font-size:13px;text-decoration:underline;background:none;border:none;font-family:var(--sans)}
.copy{cursor:pointer;color:var(--accent);font-size:12px;background:none;border:none;font-weight:700}
.note{font-size:12px;color:var(--sub);padding:12px 16px;background:#FAF9F6;border-top:1px solid var(--line)}
@media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}table{font-size:12px}th,td{padding:9px 10px}}
</style>
</head>
<body>

<div id="login"><div class="box">
  <h1>商店後台</h1>
  <p>圖文生成室 AI · 訂單與授權管理</p>
  <input type="password" id="pass" placeholder="管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn p" style="width:100%" onclick="doLogin()">登入</button>
  <p id="loginErr" style="color:var(--accent);margin-top:12px;display:none">密碼錯誤</p>
</div></div>

<div id="app">
  <header class="top"><div class="wrap">
    <h1>商店後台</h1>
    <span class="badge" id="envBadge">—</span>
    <span class="sp"></span>
    <button class="refresh" onclick="loadAll()">↻ 重新整理</button>
    <button class="btn o sm" onclick="logout()">登出</button>
  </div></header>

  <div class="wrap">
    <div class="stats">
      <div class="stat"><div class="lbl">總訂單</div><div class="v" id="sTotal">—</div></div>
      <div class="stat"><div class="lbl">已付款</div><div class="v" id="sPaid">—</div></div>
      <div class="stat"><div class="lbl">累計營收</div><div class="v accent" id="sRev">—</div></div>
      <div class="stat"><div class="lbl">有效授權</div><div class="v" id="sLic">—</div></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-t="orders" onclick="switchTab('orders')">訂單 · 綠界入帳</button>
      <button class="tab" data-t="lic" onclick="switchTab('lic')">授權碼管理</button>
    </div>

    <!-- orders -->
    <div class="panel" id="pOrders">
      <div class="toolbar">
        <select id="fStatus" onchange="renderOrders()">
          <option value="">全部狀態</option>
          <option value="paid">已付款</option>
          <option value="pending">待付款</option>
          <option value="failed">付款失敗</option>
        </select>
        <input id="fSearch" placeholder="搜尋 Email / 訂單號 / 授權碼" oninput="renderOrders()">
        <span class="sp" style="flex:1"></span>
        <span style="font-size:12px;color:var(--sub)">綠界實際撥款請至綠界官方後台查詢（T+N 日）</span>
      </div>
      <div id="ordersBody"></div>
    </div>

    <!-- licenses -->
    <div class="panel" id="pLic" style="display:none">
      <div class="toolbar">
        <input id="newName" placeholder="客戶名稱/備註">
        <select id="newPro"><option value="">一般版</option><option value="1">PRO 版</option></select>
        <button class="btn p sm" onclick="addLic()">＋ 手動開立授權碼</button>
        <span class="sp" style="flex:1"></span>
        <input id="fLic" placeholder="搜尋授權碼/名稱" oninput="renderLics()">
      </div>
      <div id="licBody"></div>
    </div>
  </div>
</div>

<script>
let PASS='',ORDERS=[],LICS=[],STATS={};

async function api(act,extra){
  const r=await fetch(API_URL+'/admin-api',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({pass:PASS,act,...(extra||{})})});
  return r.json();
}
async function doLogin(){
  PASS=document.getElementById('pass').value;
  const r=await api('orders');
  if(r.error){document.getElementById('loginErr').style.display='block';return;}
  try{sessionStorage.setItem('adpass',PASS);}catch(e){}
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  applyOrders(r);await loadLics();
}
function logout(){PASS='';try{sessionStorage.removeItem('adpass');}catch(e){}location.reload();}

async function loadAll(){const r=await api('orders');if(!r.error){applyOrders(r);}await loadLics();}
function applyOrders(r){
  ORDERS=r.orders||[];STATS=r.stats||{};
  document.getElementById('sTotal').textContent=STATS.total??0;
  document.getElementById('sPaid').textContent=STATS.paid??0;
  document.getElementById('sRev').textContent='$'+(STATS.revenue??0).toLocaleString();
  const badge=document.getElementById('envBadge');
  badge.textContent='綠界'+(r.env||'測試')+'環境';
  badge.className='badge '+(r.env==='正式'?'prod':'test');
  renderOrders();
}
async function loadLics(){const r=await api('licenses');if(!r.error){LICS=r.licenses||[];document.getElementById('sLic').textContent=LICS.length;renderLics();}}

function esc(s){return (s??'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;');}
function fmtDate(ts){if(!ts)return '—';const d=new Date(ts);return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function payLabel(t){return ({Credit:'信用卡',ATM:'ATM',WebATM:'WebATM',CVS:'超商',BARCODE:'超商條碼',TWQR:'TWQR'})[t]||t||'—';}

function renderOrders(){
  const st=document.getElementById('fStatus').value;
  const q=document.getElementById('fSearch').value.toLowerCase();
  const rows=ORDERS.filter(o=>(!st||o.status===st)&&(!q||[o.email,o.lic,o.tradeNo].join(' ').toLowerCase().includes(q)));
  const body=document.getElementById('ordersBody');
  if(!rows.length){body.innerHTML='<div class="empty">目前沒有符合的訂單</div>';return;}
  body.innerHTML=`<table><thead><tr>
    <th>時間</th><th>方案</th><th>金額</th><th>付款方式</th><th>狀態</th><th>Email</th><th>授權碼</th></tr></thead><tbody>`+
    rows.map(o=>`<tr>
      <td>${fmtDate(o.paidAt||o.created)}</td>
      <td>${esc(o.name||o.plan)}${o.pro?' <span class="pill pro">PRO</span>':''}</td>
      <td class="mono">$${o.amount||0}</td>
      <td>${payLabel(o.payType)}</td>
      <td><span class="pill ${o.status}">${({paid:'已付款',pending:'待付款',failed:'失敗'})[o.status]||o.status}</span></td>
      <td>${esc(o.email||'—')}</td>
      <td class="mono">${o.lic?esc(o.lic)+` <button class="copy" onclick="cp('${o.lic}')">複製</button>`:'—'}</td>
    </tr>`).join('')+`</tbody></table>
    <div class="note">💡 授權碼在綠界確認付款後由系統自動開立。此處「已付款」代表綠界伺服器已回傳付款成功並通過驗章。</div>`;
}

function renderLics(){
  const q=document.getElementById('fLic').value.toLowerCase();
  const rows=LICS.filter(l=>!q||[l.code,l.name].join(' ').toLowerCase().includes(q));
  const body=document.getElementById('licBody');
  if(!rows.length){body.innerHTML='<div class="empty">尚無授權碼</div>';return;}
  body.innerHTML=`<table><thead><tr><th>授權碼</th><th>名稱/備註</th><th>方案</th><th>來源訂單</th><th></th></tr></thead><tbody>`+
    rows.map(l=>`<tr>
      <td class="mono">${esc(l.code)} <button class="copy" onclick="cp('${l.code}')">複製</button></td>
      <td>${esc(l.name||'—')}</td>
      <td>${l.pro?'<span class="pill pro">PRO</span>':'一般版'}</td>
      <td class="mono">${esc(l.order||'手動')}</td>
      <td><button class="btn o sm" onclick="delLic('${l.code}')">停用</button></td>
    </tr>`).join('')+'</tbody></table>';
}

async function addLic(){
  const name=document.getElementById('newName').value.trim();
  const pro=document.getElementById('newPro').value==='1';
  const r=await api('addlic',{name,pro});
  if(r.ok){alert('已開立授權碼：'+r.code);document.getElementById('newName').value='';await loadLics();}
  else alert(r.error||'失敗');
}
async function delLic(code){
  if(!confirm('確定停用授權碼 '+code+' ？此動作立即生效且不可復原。'))return;
  const r=await api('dellic',{code});
  if(r.ok)await loadLics();
}
function cp(t){navigator.clipboard.writeText(t);}
function switchTab(t){
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on',x.dataset.t===t));
  document.getElementById('pOrders').style.display=t==='orders'?'block':'none';
  document.getElementById('pLic').style.display=t==='lic'?'block':'none';
}
// 自動登入（同分頁記住密碼）
try{const p=sessionStorage.getItem('adpass');if(p){document.getElementById('pass').value=p;doLogin();}}catch(e){}
</script>
</body>
</html>
